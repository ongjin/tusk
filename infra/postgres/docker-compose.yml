services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tusk
      POSTGRES_PASSWORD: tusk
      POSTGRES_DB: tusk_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tusk -d tusk_test"]
      interval: 1s
      timeout: 3s
      retries: 30
